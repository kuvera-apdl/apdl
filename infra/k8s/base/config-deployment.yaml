apiVersion: apps/v1
kind: Deployment
metadata:
  name: config
  namespace: apdl
  labels:
    app.kubernetes.io/name: config
    app.kubernetes.io/part-of: apdl
    app.kubernetes.io/component: config
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: config
  template:
    metadata:
      labels:
        app.kubernetes.io/name: config
        app.kubernetes.io/part-of: apdl
        app.kubernetes.io/component: config
    spec:
      serviceAccountName: config
      terminationGracePeriodSeconds: 30
      containers:
        - name: config
          image: apdl/config:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: sse
              containerPort: 8082
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: postgres-host
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: postgres-port
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: postgres-db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: POSTGRES_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: redis-port
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: log-level
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - config
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: config
  namespace: apdl
  labels:
    app.kubernetes.io/name: config
    app.kubernetes.io/part-of: apdl
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: sse
      port: 8082
      targetPort: sse
      protocol: TCP
  selector:
    app.kubernetes.io/name: config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: config
  namespace: apdl
  labels:
    app.kubernetes.io/name: config
    app.kubernetes.io/part-of: apdl

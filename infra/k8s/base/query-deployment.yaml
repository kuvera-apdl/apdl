apiVersion: apps/v1
kind: Deployment
metadata:
  name: query
  namespace: apdl
  labels:
    app.kubernetes.io/name: query
    app.kubernetes.io/part-of: apdl
    app.kubernetes.io/component: query
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: query
  template:
    metadata:
      labels:
        app.kubernetes.io/name: query
        app.kubernetes.io/part-of: apdl
        app.kubernetes.io/component: query
    spec:
      serviceAccountName: query
      terminationGracePeriodSeconds: 30
      containers:
        - name: query
          image: apdl/query:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: clickhouse-host
            - name: CLICKHOUSE_HTTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: clickhouse-http-port
            - name: CLICKHOUSE_NATIVE_PORT
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: clickhouse-native-port
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: postgres-host
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: postgres-port
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: postgres-db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: POSTGRES_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
            - name: APDL_SERVICE_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: apdl-service-api-keys
                  key: keys-json
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: apdl-config
                  key: log-level
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - query
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: query
  namespace: apdl
  labels:
    app.kubernetes.io/name: query
    app.kubernetes.io/part-of: apdl
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: query
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: query
  namespace: apdl
  labels:
    app.kubernetes.io/name: query
    app.kubernetes.io/part-of: apdl

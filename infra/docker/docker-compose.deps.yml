services:
  redis:
    image: redis:8-alpine
    ports:
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 512mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:26.6
    ports:
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_CLICKHOUSE_HTTP_HOST_PORT:-8123}:8123"   # HTTP
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_CLICKHOUSE_NATIVE_HOST_PORT:-9000}:9000"   # Native
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: apdl
      CLICKHOUSE_USER: apdl
      CLICKHOUSE_PASSWORD: apdl_dev
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          case "$$(tr '\000' '\n' </proc/1/cmdline | head -n 1)" in
            clickhouse-server|*/clickhouse-server)
              clickhouse-client --user apdl --password apdl_dev --query "SELECT 1"
              ;;
            *)
              exit 1
              ;;
          esac
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: apdl
      POSTGRES_USER: apdl
      POSTGRES_PASSWORD: apdl_dev
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          case "$$(tr '\000' '\n' </proc/1/cmdline | head -n 1)" in
            postgres|*/postgres)
              pg_isready -U apdl -d apdl
              ;;
            *)
              exit 1
              ;;
          esac
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-migrate:
    build:
      context: ../../pipeline/postgres
      dockerfile: Dockerfile
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: apdl
      PGPASSWORD: apdl_dev
      PGDATABASE: apdl
      POSTGRES_MIGRATIONS_DIR: /migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  redis-data:
  clickhouse-data:
  postgres-data:

services:
  # ─── Dependencies ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: apdl
      CLICKHOUSE_USER: apdl
      CLICKHOUSE_PASSWORD: apdl_dev
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: apdl
      POSTGRES_USER: apdl
      POSTGRES_PASSWORD: apdl_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apdl"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-migrate:
    build:
      context: ../../pipeline/postgres
      dockerfile: Dockerfile
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: apdl
      PGPASSWORD: apdl_dev
      PGDATABASE: apdl
      POSTGRES_MIGRATIONS_DIR: /migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Application Services ───────────────────────────────
  ingestion:
    build:
      context: ../../services/ingestion
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully

  config:
    build:
      context: ../../services/config
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully

  query:
    build:
      context: ../../services/query
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: apdl
      CLICKHOUSE_PASSWORD: apdl_dev
      CLICKHOUSE_DB: apdl
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      CONFIG_SERVICE_URL: http://config:8081
      APDL_SERVICE_API_KEYS: '${APDL_SERVICE_API_KEYS:-{}}'
      APDL_DEV_API_KEY: ${APDL_DEV_API_KEY:-}
      GUARDRAIL_MONITOR_ENABLED: ${GUARDRAIL_MONITOR_ENABLED:-true}
      GUARDRAIL_PROJECT_IDS: ${GUARDRAIL_PROJECT_IDS:-apdl}
      GUARDRAIL_MONITOR_INTERVAL_SECONDS: ${GUARDRAIL_MONITOR_INTERVAL_SECONDS:-60}
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully

  agents:
    build:
      context: ../../services/agents
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_URL: http://clickhouse:8123
      QUERY_SERVICE_URL: http://query:8082
      CONFIG_SERVICE_URL: http://config:8081
      CODEGEN_SERVICE_URL: http://codegen:8084
      APDL_SERVICE_API_KEYS: '${APDL_SERVICE_API_KEYS:-{}}'
      APDL_DEV_API_KEY: ${APDL_DEV_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # Codegen — autonomous code-implementation "hands". It creates and repairs
  # PR branches; GitHub alone owns CI verification, review policy, and merge.
  codegen:
    build:
      context: ../../services/codegen
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      # Provide the private key one of three ways (see .env.example). Base64 is
      # the simplest to carry through .env in Docker (no multi-line / no mount).
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_PRIVATE_KEY_BASE64: ${GITHUB_APP_PRIVATE_KEY_BASE64:-}
      GITHUB_APP_PRIVATE_KEY_PATH: ${GITHUB_APP_PRIVATE_KEY_PATH:-}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      # Empty disables the webhook endpoint; the CI poller remains available.
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      # Coding-agent model (Aider via LiteLLM) + the provider key it needs.
      CODEGEN_MODEL: ${CODEGEN_MODEL:-claude-opus-4-8}
      # Fail-closed rollout gate. Production PR stages require a read-only
      # operator evidence bundle bound to this exact model + revision.
      CODEGEN_REVISION: ${CODEGEN_REVISION:-development-unversioned}
      CODEGEN_ROLLOUT_STAGE: ${CODEGEN_ROLLOUT_STAGE:-offline}
      CODEGEN_ROLLOUT_AUTHORIZATION_PATH: ${CODEGEN_ROLLOUT_AUTHORIZATION_PATH:-}
      CODEGEN_PLATFORM_SAFETY_POLICY_PATH: ${CODEGEN_PLATFORM_SAFETY_POLICY_PATH:-}
      # Aider prompt caching (default on): caches the static prefix (system + repo
      # map) so the auto-test retry loop re-reads it at ~0.1x input price. Set
      # "false" to disable.
      CODEGEN_CACHE_PROMPTS: ${CODEGEN_CACHE_PROMPTS:-true}
      # Auxiliary LLM passes around the edit (both default on, fail-open):
      # CODEGEN_BRIEF compiles the spec into a repo-grounded work order before
      # the edit; CODEGEN_REVIEW judges the diff against the spec before the
      # push. CODEGEN_HELPER_MODEL overrides the model for these passes
      # (defaults to CODEGEN_MODEL); CODEGEN_EDIT_RETRIES bounds the feedback
      # rounds after a verify/review failure.
      CODEGEN_BRIEF: ${CODEGEN_BRIEF:-true}
      CODEGEN_REVIEW: ${CODEGEN_REVIEW:-true}
      CODEGEN_HELPER_MODEL: ${CODEGEN_HELPER_MODEL:-}
      CODEGEN_EDIT_RETRIES: ${CODEGEN_EDIT_RETRIES:-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # The isolated worker is the fail-closed default. PR rollout stages also
      # require an explicitly named, egress-filtered sandbox network.
      CODEGEN_SANDBOX: ${CODEGEN_SANDBOX:-docker}
      CODEGEN_SANDBOX_IMAGE: ${CODEGEN_SANDBOX_IMAGE:-apdl-codegen-sandbox:latest}
      CODEGEN_SANDBOX_NETWORK: ${CODEGEN_SANDBOX_NETWORK:-}
      CODEGEN_TRUSTED_REPOS_ONLY: ${CODEGEN_TRUSTED_REPOS_ONLY:-false}
      # Max changeset jobs to run at once. Each runs a coding agent + the repo's
      # build/test (CPU/memory heavy), so the default serializes (1); raise only
      # on a host with cores to spare. Excess jobs wait in `queued`.
      CODEGEN_MAX_CONCURRENT_JOBS: ${CODEGEN_MAX_CONCURRENT_JOBS:-1}
      # CI-status poll interval (seconds). The zero-config trigger that advances
      # open changesets without an inbound webhook. Default 60; set 0 to disable
      # (e.g. once a low-latency GitHub webhook is wired as the sole driver).
      CODEGEN_CI_POLL_INTERVAL: ${CODEGEN_CI_POLL_INTERVAL:-60}
      CODEGEN_CI_REPAIR_RETRIES: ${CODEGEN_CI_REPAIR_RETRIES:-2}
      CODEGEN_CI_REPAIR_BUDGET_SECONDS: ${CODEGEN_CI_REPAIR_BUDGET_SECONDS:-3600}
    # Optional bind mounts — uncomment `volumes:` and the line(s) you need:
    #  * Private key via GITHUB_APP_PRIVATE_KEY_PATH: mounts your .pem read-only
    #    at the SAME path inside the container, so set that path in .env (use an
    #    ABSOLUTE path — `~` is not expanded for a mount). base64 avoids this.
    #  * Docker socket: lets codegen launch the sandbox container (Option B,
    #    CODEGEN_SANDBOX=docker). SECURITY: grants host-root-equivalent access.
    #  * Rollout bundle: mount CODEGEN_ROLLOUT_AUTHORIZATION_PATH read-only for
    #    reviewed_pr or low_risk_canary; offline/shadow need no bundle.
    #  * Platform safety policy: mount CODEGEN_PLATFORM_SAFETY_POLICY_PATH
    #    read-only at the same absolute path when overriding built-in defaults.
    # volumes:
    #   - ${GITHUB_APP_PRIVATE_KEY_PATH}:${GITHUB_APP_PRIVATE_KEY_PATH}:ro
    #   - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully

  clickhouse-writer:
    build:
      context: ../../pipeline/redis
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_URL: clickhouse://apdl:apdl_dev@clickhouse:9000/apdl
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  # Admin backend-for-frontend. Human sessions and tenant roles live in
  # PostgreSQL; project service credentials never enter the SPA.
  admin-api:
    build:
      context: ../../services/admin-api
      dockerfile: Dockerfile
    environment:
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      INGESTION_SERVICE_URL: http://ingestion:8080
      CONFIG_SERVICE_URL: http://config:8081
      QUERY_SERVICE_URL: http://query:8082
      AGENTS_SERVICE_URL: http://agents:8083
      CODEGEN_SERVICE_URL: http://codegen:8084
      APDL_SERVICE_API_KEYS: '${APDL_SERVICE_API_KEYS:-{}}'
      APDL_DEV_API_KEY: ${APDL_DEV_API_KEY:-}
      APDL_ADMIN_ALLOWED_ORIGINS: '${APDL_ADMIN_ALLOWED_ORIGINS:-["http://localhost:5173","http://localhost:5174"]}'
      APDL_ADMIN_COOKIE_SECURE: ${APDL_ADMIN_COOKIE_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully
      ingestion:
        condition: service_started
      config:
        condition: service_started
      query:
        condition: service_started
      agents:
        condition: service_started
      codegen:
        condition: service_started

  # Admin console — static SPA served by nginx. Only /api is dynamic, and it is
  # forwarded to admin-api on the private Compose network.
  admin:
    build:
      context: ../../services/admin
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - admin-api

  # Gateway — single SDK front door. Routes /v1/events to ingestion and
  # /v1/flags + /v1/stream to config, so an SDK connects with one `endpoint`
  # URL (http://<host>:8000) instead of separate ingestion + config URLs.
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ingestion
      - config

volumes:
  redis-data:
  clickhouse-data:
  postgres-data:

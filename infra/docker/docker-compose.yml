services:
  # ─── Dependencies ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: apdl
      CLICKHOUSE_USER: apdl
      CLICKHOUSE_PASSWORD: apdl_dev
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: apdl
      POSTGRES_USER: apdl
      POSTGRES_PASSWORD: apdl_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apdl"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Application Services ───────────────────────────────
  ingestion:
    build:
      context: ../../services/ingestion
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy

  config:
    build:
      context: ../../services/config
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      APDL_INTERNAL_TOKEN: ${APDL_INTERNAL_TOKEN:-apdl-dev-internal-token}
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  query:
    build:
      context: ../../services/query
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: apdl
      CLICKHOUSE_PASSWORD: apdl_dev
      CLICKHOUSE_DB: apdl
      CONFIG_SERVICE_URL: http://config:8081
      APDL_INTERNAL_TOKEN: ${APDL_INTERNAL_TOKEN:-apdl-dev-internal-token}
      GUARDRAIL_MONITOR_ENABLED: ${GUARDRAIL_MONITOR_ENABLED:-true}
      GUARDRAIL_PROJECT_IDS: ${GUARDRAIL_PROJECT_IDS:-apdl}
      GUARDRAIL_MONITOR_INTERVAL_SECONDS: ${GUARDRAIL_MONITOR_INTERVAL_SECONDS:-60}
    depends_on:
      clickhouse:
        condition: service_healthy

  agents:
    build:
      context: ../../services/agents
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_URL: http://clickhouse:8123
      QUERY_SERVICE_URL: http://query:8082
      CONFIG_SERVICE_URL: http://config:8081
      APDL_INTERNAL_TOKEN: ${APDL_INTERNAL_TOKEN:-apdl-dev-internal-token}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Codegen — autonomous code-implementation "hands". Holds the GitHub App
  # credentials and (in later phases) runs sandboxed clone/build/test jobs. The
  # agents service calls it over the internal API to open and merge PRs.
  codegen:
    build:
      context: ../../services/codegen
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      APDL_INTERNAL_TOKEN: ${APDL_INTERNAL_TOKEN:-apdl-dev-internal-token}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      # Coding-agent model (Aider via LiteLLM) + the provider key it needs.
      CODEGEN_MODEL: ${CODEGEN_MODEL:-claude-opus-4-8}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  clickhouse-writer:
    build:
      context: ../../pipeline/redis
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_URL: clickhouse://apdl:apdl_dev@clickhouse:9000/apdl
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  # Admin console — static SPA served by nginx. The browser calls config/query/
  # agents directly, so the baked VITE_* URLs must be browser-reachable (NOT
  # Docker service names). Defaults suit an SSH tunnel (localhost:<port>);
  # override via ADMIN_*_URL for public-IP access, or change them in-app under
  # Workspace Settings. No depends_on: it serves files, it doesn't call services.
  admin:
    build:
      context: ../../services/admin
      dockerfile: Dockerfile
      args:
        VITE_INGESTION_URL: ${ADMIN_INGESTION_URL:-http://localhost:8080}
        VITE_CONFIG_URL: ${ADMIN_CONFIG_URL:-http://localhost:8081}
        VITE_QUERY_URL: ${ADMIN_QUERY_URL:-http://localhost:8082}
        VITE_AGENTS_URL: ${ADMIN_AGENTS_URL:-http://localhost:8083}
    ports:
      - "5173:80"

  # Gateway — single SDK front door. Routes /v1/events to ingestion and
  # /v1/flags + /v1/stream to config, so an SDK connects with one `endpoint`
  # URL (http://<host>:8000) instead of separate ingestion + config URLs.
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ingestion
      - config

volumes:
  redis-data:
  clickhouse-data:
  postgres-data:

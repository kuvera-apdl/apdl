services:
  # ─── Dependencies ────────────────────────────────────────
  redis:
    image: redis:8-alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    ports:
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory ${APDL_REDIS_MAXMEMORY:-1gb} --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:26.6@sha256:1d1f6508eba2dccce2cee9913907c5f7766327debc57a6b1991f2c9e3176c163
    ports:
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_CLICKHOUSE_HTTP_HOST_PORT:-8123}:8123"
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_CLICKHOUSE_NATIVE_HOST_PORT:-9000}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: apdl
      CLICKHOUSE_USER: apdl
      CLICKHOUSE_PASSWORD: apdl_dev
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
    ports:
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: apdl
      POSTGRES_USER: apdl
      POSTGRES_PASSWORD: apdl_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apdl"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-migrate:
    build:
      context: ../../pipeline/postgres
      dockerfile: Dockerfile
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: apdl
      PGPASSWORD: apdl_dev
      PGDATABASE: apdl
      POSTGRES_MIGRATIONS_DIR: /migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Application Services ───────────────────────────────
  ingestion:
    build:
      context: ../../services/ingestion
      dockerfile: Dockerfile
    ports:
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_INGESTION_HOST_PORT:-8080}:8080"
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      # Docker's default bridge address pool. Production deployments should
      # narrow this to the exact public-edge proxy network.
      INGESTION_TRUSTED_PROXY_CIDRS: ${INGESTION_TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
      LOG_LEVEL: info
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,urllib.request; assert json.load(urllib.request.urlopen('http://localhost:8080/health', timeout=2))['status'] == 'ok'",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully

  config:
    build:
      context: ../../services/config
      dockerfile: Dockerfile
    ports:
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_CONFIG_HOST_PORT:-8081}:8081"
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      # Docker's default bridge address pool. Production deployments should
      # narrow this to the exact public-edge proxy network.
      CONFIG_TRUSTED_PROXY_CIDRS: ${CONFIG_TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
      SSE_CREDENTIAL_CHECK_INTERVAL_SECONDS: ${SSE_CREDENTIAL_CHECK_INTERVAL_SECONDS:-5}
      LOG_LEVEL: info
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,urllib.request; assert json.load(urllib.request.urlopen('http://localhost:8081/ready', timeout=2))['status'] == 'ready'",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully

  query:
    build:
      context: ../../services/query
      dockerfile: Dockerfile
    ports:
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_QUERY_HOST_PORT:-8082}:8082"
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: apdl
      CLICKHOUSE_PASSWORD: apdl_dev
      CLICKHOUSE_DB: apdl
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      CONFIG_SERVICE_URL: http://config:8081
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,urllib.request; assert json.load(urllib.request.urlopen('http://localhost:8082/ready', timeout=2))['status'] == 'ready'",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully
      config:
        condition: service_healthy

  agents:
    profiles: ["agents"]
    build:
      context: ../../services/agents
      dockerfile: Dockerfile
    ports:
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_AGENTS_HOST_PORT:-8083}:8083"
    environment:
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_URL: http://clickhouse:8123
      QUERY_SERVICE_URL: http://query:8082
      CONFIG_SERVICE_URL: http://config:8081
      CODEGEN_SERVICE_URL: http://codegen:8084
      APDL_SERVICE_API_KEYS: '${APDL_SERVICE_API_KEYS:-{}}'
      APDL_DEV_API_KEY: ${APDL_DEV_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      LOCAL_LLM_URL: ${LOCAL_LLM_URL:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,urllib.request; assert json.load(urllib.request.urlopen('http://localhost:8083/ready', timeout=2))['status'] == 'ready'",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # Codegen — autonomous code-implementation "hands". It creates and repairs
  # PR branches; GitHub alone owns CI verification, review policy, and merge.
  codegen:
    profiles: ["codegen"]
    build:
      context: ../../services/codegen
      dockerfile: Dockerfile
    # Deliberately not published on the host. Agents and the Admin API reach
    # Codegen by its private Compose service name (`http://codegen:8084`).
    expose:
      - "8084"
    environment:
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      # Provide the private key one of three ways (see .env.example). Base64 is
      # the simplest to carry through .env in Docker (no multi-line / no mount).
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_PRIVATE_KEY_BASE64: ${GITHUB_APP_PRIVATE_KEY_BASE64:-}
      GITHUB_APP_PRIVATE_KEY_PATH: ${GITHUB_APP_PRIVATE_KEY_PATH:-}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      # Empty disables the webhook endpoint; the CI poller remains available.
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      # Coding-agent model (Aider via LiteLLM) + the provider key it needs.
      CODEGEN_MODEL: ${CODEGEN_MODEL:-claude-opus-4-8}
      # Fail-closed rollout gate. Production PR stages require a read-only
      # operator evidence bundle bound to this exact model + revision.
      CODEGEN_REVISION: ${CODEGEN_REVISION:-development-unversioned}
      # The base stack is evaluation-only even if an old host .env still carries
      # publication settings. PR stages are enabled exclusively by the reviewed
      # rollout overlay, which also requires immutable evaluated image IDs.
      CODEGEN_ROLLOUT_STAGE: offline
      CODEGEN_ROLLOUT_AUTHORIZATION_PATH: ""
      CODEGEN_PLATFORM_SAFETY_POLICY_PATH: ${CODEGEN_PLATFORM_SAFETY_POLICY_PATH:-}
      # Aider prompt caching (default on): caches the static prefix (system + repo
      # map) so the auto-test retry loop re-reads it at ~0.1x input price. Set
      # "false" to disable.
      CODEGEN_CACHE_PROMPTS: ${CODEGEN_CACHE_PROMPTS:-true}
      # Auxiliary LLM passes around the edit (both default on, fail-open):
      # CODEGEN_BRIEF compiles the spec into a repo-grounded work order before
      # the edit; CODEGEN_REVIEW judges the diff against the spec before the
      # push. CODEGEN_HELPER_MODEL overrides the model for these passes
      # (defaults to CODEGEN_MODEL); CODEGEN_EDIT_RETRIES bounds the feedback
      # rounds after a verify/review failure.
      CODEGEN_BRIEF: ${CODEGEN_BRIEF:-true}
      CODEGEN_REVIEW: ${CODEGEN_REVIEW:-true}
      CODEGEN_HELPER_MODEL: ${CODEGEN_HELPER_MODEL:-}
      CODEGEN_EDIT_RETRIES: ${CODEGEN_EDIT_RETRIES:-1}
      CODEGEN_REQUIRE_VERIFY: ${CODEGEN_REQUIRE_VERIFY:-false}
      CODEGEN_CONVENTIONS: ${CODEGEN_CONVENTIONS:-true}
      CODEGEN_CONTRACTS: ${CODEGEN_CONTRACTS:-true}
      CODEGEN_CONTRACT_INSTALL_TIMEOUT: ${CODEGEN_CONTRACT_INSTALL_TIMEOUT:-600}
      CODEGEN_TIMEOUT: ${CODEGEN_TIMEOUT:-1800}
      CODEGEN_GIT_TIMEOUT: ${CODEGEN_GIT_TIMEOUT:-300}
      CODEGEN_LLM_TIMEOUT: ${CODEGEN_LLM_TIMEOUT:-240}
      # May tighten but never exceed the 3000s GitHub write-token safety cap.
      CODEGEN_JOB_BUDGET: ${CODEGEN_JOB_BUDGET:-3000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      VERTEXAI_PROJECT: ${VERTEXAI_PROJECT:-}
      VERTEXAI_LOCATION: ${VERTEXAI_LOCATION:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      TOGETHERAI_API_KEY: ${TOGETHERAI_API_KEY:-}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-}
      AZURE_API_KEY: ${AZURE_API_KEY:-}
      AZURE_API_BASE: ${AZURE_API_BASE:-}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-}
      # The isolated worker is the fail-closed default. PR rollout stages also
      # use Docker --network none plus an attested proxy Unix socket in the
      # reviewed rollout overlay.
      CODEGEN_SANDBOX: ${CODEGEN_SANDBOX:-docker}
      CODEGEN_SANDBOX_IMAGE: ${CODEGEN_SANDBOX_IMAGE:-apdl-codegen-sandbox:latest}
      CODEGEN_SANDBOX_NETWORK: ${CODEGEN_SANDBOX_NETWORK:-}
      # Egress attestation is enabled only by the reviewed rollout overlay.
      # Clear ambient host values so the normal offline stack cannot claim it.
      CODEGEN_EGRESS_POLICY_SHA256: ""
      CODEGEN_EGRESS_PROXY_IMAGE_ID: ""
      CODEGEN_EGRESS_SOCKET_VOLUME: ""
      CODEGEN_EGRESS_PROXY_URL: http://127.0.0.1:3128
      CODEGEN_TRUSTED_REPOS_ONLY: ${CODEGEN_TRUSTED_REPOS_ONLY:-false}
      # Max changeset jobs to run at once. Each runs a coding agent + the repo's
      # build/test (CPU/memory heavy), so the default serializes (1); raise only
      # on a host with cores to spare. Excess jobs wait in `queued`.
      CODEGEN_MAX_CONCURRENT_JOBS: ${CODEGEN_MAX_CONCURRENT_JOBS:-1}
      # CI-status poll interval (seconds). The zero-config trigger that advances
      # open changesets without an inbound webhook. Default 60; set 0 to disable
      # (e.g. once a low-latency GitHub webhook is wired as the sole driver).
      CODEGEN_CI_POLL_INTERVAL: ${CODEGEN_CI_POLL_INTERVAL:-60}
      CODEGEN_CI_REPAIR_RETRIES: ${CODEGEN_CI_REPAIR_RETRIES:-2}
      CODEGEN_CI_REPAIR_BUDGET_SECONDS: ${CODEGEN_CI_REPAIR_BUDGET_SECONDS:-3600}
    # Optional bind mounts — uncomment `volumes:` and the line(s) you need:
    #  * Private key via GITHUB_APP_PRIVATE_KEY_PATH: mounts your .pem read-only
    #    at the SAME path inside the container, so set that path in .env (use an
    #    ABSOLUTE path — `~` is not expanded for a mount). base64 avoids this.
    #  * Docker socket: lets codegen launch the sandbox container (Option B,
    #    CODEGEN_SANDBOX=docker). SECURITY: grants host-root-equivalent access.
    #  * Rollout bundle: mount CODEGEN_ROLLOUT_AUTHORIZATION_PATH read-only for
    #    reviewed_pr or low_risk_canary; offline/shadow need no bundle.
    #  * Platform safety policy: mount CODEGEN_PLATFORM_SAFETY_POLICY_PATH
    #    read-only at the same absolute path when overriding built-in defaults.
    # volumes:
    #   - ${GITHUB_APP_PRIVATE_KEY_PATH}:${GITHUB_APP_PRIVATE_KEY_PATH}:ro
    #   - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully

  clickhouse-writer:
    build:
      context: ../../pipeline/redis
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_NATIVE_URL: clickhouse://apdl:apdl_dev@clickhouse:9000/apdl
      CLICKHOUSE_CONNECT_TIMEOUT_SECONDS: ${CLICKHOUSE_CONNECT_TIMEOUT_SECONDS:-5}
      CLICKHOUSE_SEND_RECEIVE_TIMEOUT_SECONDS: ${CLICKHOUSE_SEND_RECEIVE_TIMEOUT_SECONDS:-30}
      CLICKHOUSE_SYNC_REQUEST_TIMEOUT_SECONDS: ${CLICKHOUSE_SYNC_REQUEST_TIMEOUT_SECONDS:-5}
      SHUTDOWN_TIMEOUT_SECONDS: ${SHUTDOWN_TIMEOUT_SECONDS:-10}
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  # Admin backend-for-frontend. Human sessions and tenant roles live in
  # PostgreSQL; project service credentials never enter the SPA.
  admin-api:
    build:
      context: ../../services/admin-api
      dockerfile: Dockerfile
    environment:
      POSTGRES_URL: postgresql://apdl:apdl_dev@postgres:5432/apdl
      INGESTION_SERVICE_URL: http://ingestion:8080
      CONFIG_SERVICE_URL: http://config:8081
      QUERY_SERVICE_URL: http://query:8082
      AGENTS_SERVICE_URL: http://agents:8083
      CODEGEN_SERVICE_URL: http://codegen:8084
      APDL_SERVICE_API_KEYS: '${APDL_SERVICE_API_KEYS:-{}}'
      APDL_DEV_API_KEY: ${APDL_DEV_API_KEY:-}
      APDL_ADMIN_ALLOWED_ORIGINS: '${APDL_ADMIN_ALLOWED_ORIGINS:-["http://localhost:5173","http://localhost:5174"]}'
      APDL_ADMIN_COOKIE_SECURE: ${APDL_ADMIN_COOKIE_SECURE:-false}
      APDL_ADMIN_TRUSTED_PROXY_CIDRS: '${APDL_ADMIN_TRUSTED_PROXY_CIDRS:-["172.30.255.0/28"]}'
      APDL_ADMIN_LOGIN_RISK_HMAC_KEY: ${APDL_ADMIN_LOGIN_RISK_HMAC_KEY:-local-admin-login-risk-key-change-me}
      APDL_ADMIN_STREAM_AUTH_CHECK_SECONDS: ${APDL_ADMIN_STREAM_AUTH_CHECK_SECONDS:-5}
      APDL_ADMIN_UPSTREAM_READ_TIMEOUT_SECONDS: ${APDL_ADMIN_UPSTREAM_READ_TIMEOUT_SECONDS:-60}
      APDL_ADMIN_READINESS_PROBE_TIMEOUT_SECONDS: ${APDL_ADMIN_READINESS_PROBE_TIMEOUT_SECONDS:-2}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,urllib.request; assert json.load(urllib.request.urlopen('http://localhost:8085/api/ready', timeout=2))['status'] == 'ready'",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully
      ingestion:
        condition: service_healthy
      config:
        condition: service_healthy
      query:
        condition: service_healthy
    networks:
      - default
      - admin-edge

  # Admin console — static SPA served by nginx. Only /api is dynamic, and it is
  # forwarded to admin-api on the private Compose network.
  admin:
    build:
      context: ../../services/admin
      dockerfile: Dockerfile
    ports:
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_ADMIN_HOST_PORT:-5173}:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1/api/ready | grep -q '\"status\":\"ready\"'",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      admin-api:
        condition: service_healthy
    networks:
      - admin-edge

  # Gateway — single SDK front door. Routes /v1/events to ingestion and
  # /v1/flags + /v1/stream to config, so an SDK connects with one `endpoint`
  # URL (http://<host>:8000) instead of separate ingestion + config URLs.
  gateway:
    image: nginx:1.31-alpine@sha256:7068961d45b07b2af510ac002e9daa63a1d3eba2111202d6768798690800fffd
    ports:
      - "${APDL_BIND_ADDRESS:-127.0.0.1}:${APDL_GATEWAY_HOST_PORT:-8000}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1/ | grep -qx 'apdl gateway ok'",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      ingestion:
        condition: service_healthy
      config:
        condition: service_healthy

volumes:
  redis-data:
  clickhouse-data:
  postgres-data:

networks:
  admin-edge:
    ipam:
      config:
        - subnet: 172.30.255.0/28

http_port 127.0.0.1:3128
visible_hostname apdl-codegen-egress

acl socket_relay src 127.0.0.1/32
acl Safe_ports port 80 443
acl SSL_ports port 443
acl CONNECT method CONNECT
acl blocked_ipv4 dst 0.0.0.0/8
acl blocked_ipv4 dst 10.0.0.0/8
acl blocked_ipv4 dst 100.64.0.0/10
acl blocked_ipv4 dst 127.0.0.0/8
acl blocked_ipv4 dst 169.254.0.0/16
acl blocked_ipv4 dst 172.16.0.0/12
acl blocked_ipv4 dst 192.0.0.0/24
acl blocked_ipv4 dst 192.0.2.0/24
acl blocked_ipv4 dst 192.168.0.0/16
acl blocked_ipv4 dst 198.18.0.0/15
acl blocked_ipv4 dst 198.51.100.0/24
acl blocked_ipv4 dst 203.0.113.0/24
acl blocked_ipv4 dst 224.0.0.0/4
acl blocked_ipv4 dst 240.0.0.0/4
acl blocked_ipv6 dst ::/128
acl blocked_ipv6 dst ::1/128
acl blocked_ipv6 dst fc00::/7
acl blocked_ipv6 dst fe80::/10
acl blocked_ipv6 dst 2001:db8::/32
acl blocked_ipv6 dst ff00::/8
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"

http_access deny !socket_relay
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access deny blocked_ipv4
http_access deny blocked_ipv6
http_access allow allowed_domains
http_access deny all

cache deny all
cache_dir null /tmp
cache_mem 16 MB
maximum_object_size 0 KB
refresh_pattern . 0 0% 0

forwarded_for delete
via off
request_header_access Proxy-Authorization deny all
request_header_access X-Forwarded-For deny all

access_log stdio:/dev/stdout
cache_log /dev/stderr
cache_store_log none
logfile_rotate 0
pid_filename /tmp/squid.pid
coredump_dir /tmp
shutdown_lifetime 1 seconds

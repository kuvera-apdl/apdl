# APDL gateway — single front door for the SDKs. Both SDKs send only three
# paths; routing them by prefix lets an SDK use ONE `endpoint` URL instead of
# separate ingestion + config URLs. Upstreams are compose service names, so this
# config targets the dockerized stack (make dev-all).
server {
    listen 80;
    server_name _;

    # Event ingestion → ingestion service.
    location = /v1/events {
        client_max_body_size 512k;
        error_page 413 = @payload_too_large;
        proxy_request_buffering on;
        proxy_pass http://ingestion:8080;
        proxy_set_header Host $host;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @payload_too_large {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        return 413 '{"error":"payload_too_large","message":"Request body exceeds the configured limit"}';
    }

    # Feature-flag polling → config service.
    location = /v1/flags {
        proxy_pass http://config:8081;
        proxy_set_header Host $host;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Feature-flag stream (SSE) → config service. SSE needs buffering off, a long
    # read timeout, and HTTP/1.1 with no Connection header so the stream stays open.
    location = /v1/stream {
        proxy_pass http://config:8081;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # Gateway liveness.
    location = / {
        default_type text/plain;
        return 200 'apdl gateway ok\n';
    }

    # Nothing else is part of the SDK surface (admin/query/agents use their own ports).
    location / {
        return 404;
    }
}

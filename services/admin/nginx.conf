limit_req_zone $binary_remote_addr zone=admin_auth_ip:10m rate=30r/m;
limit_req_zone $server_name zone=admin_auth_global:1m rate=300r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 2m;
    error_page 413 = @payload_too_large;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Same-origin backend-for-frontend. Disabling buffering is required for the
    # config EventSource stream; ordinary JSON responses are still small.
    location ~ ^/api/auth/(login|register)$ {
        error_page 413 = @payload_too_large;
        limit_req zone=admin_auth_global burst=100 nodelay;
        limit_req zone=admin_auth_ip burst=20 nodelay;
        limit_req_status 429;
        error_page 429 = @auth_throttled;
        proxy_pass http://admin-api:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @auth_throttled {
        internal;
        default_type application/json;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Retry-After "60" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        return 429 '{"error":"auth_throttled","message":"Too many attempts. Try again later.","retry_after_seconds":60}';
    }

    location @payload_too_large {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        return 413 '{"error":"payload_too_large","message":"Request body exceeds the configured limit"}';
    }

    location /api/ {
        error_page 413 = @payload_too_large;
        proxy_pass http://admin-api:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 95s;
    }

    # SPA fallback: react-router owns client-side routes, so any unmatched
    # path must return index.html rather than a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the fingerprinted asset bundle; never cache the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

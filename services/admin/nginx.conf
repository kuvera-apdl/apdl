limit_req_zone $binary_remote_addr zone=admin_login:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Same-origin backend-for-frontend. Disabling buffering is required for the
    # config EventSource stream; ordinary JSON responses are still small.
    location = /api/auth/login {
        limit_req zone=admin_login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://admin-api:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://admin-api:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 95s;
    }

    # SPA fallback: react-router owns client-side routes, so any unmatched
    # path must return index.html rather than a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the fingerprinted asset bundle; never cache the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

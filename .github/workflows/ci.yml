name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  sdk:
    name: SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: sdk/javascript
      - run: npm test -- --coverage
        working-directory: sdk/javascript
      - run: npm run build
        working-directory: sdk/javascript

  admin-console:
    name: Admin Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: services/admin
      - run: npm run lint
        working-directory: services/admin
      - run: npm test
        working-directory: services/admin
      - run: npm run build
        working-directory: services/admin

  admin-api:
    name: Admin API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: services/admin-api
      - run: ruff check app/ scripts/ tests/
        working-directory: services/admin-api
      - run: python -m pytest -q
        working-directory: services/admin-api

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: sdk/python
      - run: ruff check apdl/ tests/
        working-directory: sdk/python
      - run: python -m pytest -q --cov=apdl --cov-report=term-missing --cov-fail-under=88
        working-directory: sdk/python

  query-service:
    name: Query Service Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: services/query
      - run: ruff check app/
        working-directory: services/query

  agents-service:
    name: Agents Service Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: services/agents
      - run: ruff check app/
        working-directory: services/agents

  ingestion-service:
    name: Ingestion Service Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: services/ingestion
      - run: ruff check app/
        working-directory: services/ingestion

  config-service:
    name: Config Service Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: services/config
      - run: ruff check app/
        working-directory: services/config

  codegen-service:
    name: Codegen Service and Candidate Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: services/codegen
      - run: ruff check app/ tests/
        working-directory: services/codegen
      - run: python -m pytest -q
        working-directory: services/codegen
      - run: docker build -t apdl-codegen-controller:ci services/codegen
      - run: >-
          docker build
          --build-arg CODEGEN_REVISION=${{ github.sha }}
          -f services/codegen/Dockerfile.worker
          -t apdl-codegen-candidate:ci
          services/codegen
      - name: Verify candidate packaging boundary
        run: |
          docker run --rm --entrypoint sh apdl-codegen-candidate:ci -ec '
            command -v apdl-codegen-evaluate-candidate >/dev/null
            root="$(python -c "from pathlib import Path; import app.evaluations; print(Path(app.evaluations.__file__).parent)")"
            test ! -e "$root/oracles_v1.json"
            test ! -e "$root/corpus_v2.json"
            test ! -e "$root/fixtures"
          '

  clickhouse-writer:
    name: ClickHouse Writer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
        working-directory: pipeline/redis
      - run: ruff check clickhouse_writer.py tests/
        working-directory: pipeline/redis
      - run: python -m pytest -q
        working-directory: pipeline/redis

  etl-framework:
    name: ETL Framework
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: pipeline/etl
      - run: ruff check etl/ scripts/ tests/
        working-directory: pipeline/etl
      - run: python -m pytest -v
        working-directory: pipeline/etl

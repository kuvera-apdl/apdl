name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  sdk:
    name: SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install
        working-directory: sdk/javascript
      - run: npm test -- --coverage
        working-directory: sdk/javascript
      - run: npm run build
        working-directory: sdk/javascript

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: sdk/python
      - run: ruff check apdl/ tests/
        working-directory: sdk/python
      - run: python -m pytest -q --cov=apdl --cov-report=term-missing --cov-fail-under=88
        working-directory: sdk/python

  query-service:
    name: Query Service Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: services/query
      - run: ruff check app/
        working-directory: services/query

  agents-service:
    name: Agents Service Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: services/agents
      - run: ruff check app/
        working-directory: services/agents

  ingestion-service:
    name: Ingestion Service Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: services/ingestion
      - run: ruff check app/
        working-directory: services/ingestion

  config-service:
    name: Config Service Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: services/config
      - run: ruff check app/
        working-directory: services/config

  etl-framework:
    name: ETL Framework
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
        working-directory: pipeline/etl
      - run: ruff check etl/ scripts/ tests/
        working-directory: pipeline/etl
      - run: python -m pytest -v
        working-directory: pipeline/etl

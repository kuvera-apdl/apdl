name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  javascript-sdk:
    name: JavaScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/javascript/package-lock.json
      - run: npm ci
        working-directory: sdk/javascript
      - run: npm audit --audit-level=high
        working-directory: sdk/javascript
      - run: npm run lint
        working-directory: sdk/javascript
      - run: npm run test:coverage
        working-directory: sdk/javascript
      - run: npm run build
        working-directory: sdk/javascript
      - run: npm run lint:package
        working-directory: sdk/javascript

  admin-console:
    name: Admin Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/admin/package-lock.json
      - run: npm ci
        working-directory: services/admin
      - run: npm audit --audit-level=high
        working-directory: services/admin
      - run: npm run lint
        working-directory: services/admin
      - run: npm test
        working-directory: services/admin
      - run: npm run build
        working-directory: services/admin

  admin-api:
    name: Admin API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: services/admin-api
      - run: .venv/bin/ruff check app/ scripts/ tests/
        working-directory: services/admin-api
      - run: .venv/bin/python -m pytest -q
        working-directory: services/admin-api

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: sdk/python
      - run: .venv/bin/ruff check apdl/ tests/
        working-directory: sdk/python
      - run: .venv/bin/python -m pytest -q --cov=apdl --cov-report=term-missing --cov-fail-under=88
        working-directory: sdk/python

  ingestion-service:
    name: Ingestion Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: services/ingestion
      - run: .venv/bin/ruff check app/
        working-directory: services/ingestion
      - run: .venv/bin/python -m pytest -q
        working-directory: services/ingestion

  config-service:
    name: Config Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: services/config
      - run: .venv/bin/ruff check app/
        working-directory: services/config
      - run: .venv/bin/python -m pytest -q
        working-directory: services/config

  query-service:
    name: Query Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: services/query
      - run: .venv/bin/ruff check app/
        working-directory: services/query
      - run: .venv/bin/python -m pytest -q
        working-directory: services/query

  agents-service:
    name: Agents Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: services/agents
      - run: .venv/bin/ruff check app/
        working-directory: services/agents
      - run: .venv/bin/python -m pytest -q
        working-directory: services/agents

  codegen-service:
    name: Codegen Service (source-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: services/codegen
      - run: .venv/bin/ruff check app/ tests/
        working-directory: services/codegen
      - run: .venv/bin/python -m pytest -q
        working-directory: services/codegen

  clickhouse-writer:
    name: ClickHouse Writer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv venv --python 3.12 .venv && uv pip install -r requirements-dev.txt --python .venv/bin/python
        working-directory: pipeline/redis
      - run: .venv/bin/ruff check clickhouse_writer.py tests/
        working-directory: pipeline/redis
      - run: .venv/bin/python -m pytest -q
        working-directory: pipeline/redis

  etl-framework:
    name: ETL Framework (experimental)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: pipeline/etl
      - run: .venv/bin/ruff check etl/ scripts/ tests/
        working-directory: pipeline/etl
      - run: .venv/bin/python -m pytest -q
        working-directory: pipeline/etl

  python-dependency-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Audit reproducible core runtime locks
        shell: bash
        run: |
          set -euo pipefail
          for lock in \
            services/ingestion/requirements.lock \
            services/config/requirements.lock \
            services/query/requirements.lock \
            services/admin-api/requirements.lock \
            pipeline/redis/requirements.lock
          do
            uvx pip-audit --strict --require-hashes -r "$lock"
          done
      - name: Audit resolved published and preview Python runtimes
        shell: bash
        run: |
          set -euo pipefail
          # services/codegen means the offline API dependency set only. The
          # unsupported Aider editor/worker `agent` extra is not installed by
          # the 0.3.0 stack and is explicitly excluded by SUPPORT.md.
          for project in sdk/python services/agents services/codegen
          do
            slug="${project//\//-}"
            requirements="$RUNNER_TEMP/$slug-audit.txt"
            uv pip compile "$project/pyproject.toml" \
              --python-version 3.12 \
              --output-file "$requirements" \
              --quiet
            uvx pip-audit --strict -r "$requirements"
          done

  package-contracts:
    name: Release Package Contracts
    runs-on: ubuntu-latest
    env:
      NODE: node
      NPM: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/javascript/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: npm ci
        working-directory: sdk/javascript
      - name: Install packed-contract validator
        run: >-
          uv venv --python 3.12 services/ingestion/.venv &&
          uv pip install -e services/ingestion
          --python services/ingestion/.venv/bin/python
      - run: make verify-release
      - run: make test-script-contracts
      - run: make test-packed-sdk-contract
      - run: make test-packed-python-sdk

  fresh-core-smoke:
    name: Fresh Install Core Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make smoke-fresh

  fresh-experiment-smoke:
    name: Fresh Install Experiment Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make smoke-experiment-fresh

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

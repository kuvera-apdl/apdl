name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  workflow-policy:
    name: Immutable Workflow Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Enforce full-SHA GitHub Action pins
        run: python3 scripts/check_github_action_pins.py
      - name: Test workflow dependency policy
        run: python3 -m unittest scripts.tests.test_github_action_pins

  javascript-sdk:
    name: JavaScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/javascript/package-lock.json
      - run: npm ci
        working-directory: sdk/javascript
      - run: npm audit --audit-level=high
        working-directory: sdk/javascript
      - run: npm run lint
        working-directory: sdk/javascript
      - run: npm run test:coverage
        working-directory: sdk/javascript
      - run: npm run build
        working-directory: sdk/javascript
      - run: npm run test:built-browser
        working-directory: sdk/javascript
      - run: npm run lint:package
        working-directory: sdk/javascript

  admin-console:
    name: Admin Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/admin/package-lock.json
      - run: npm ci
        working-directory: services/admin
      - run: npm audit --audit-level=high
        working-directory: services/admin
      - run: npm run lint
        working-directory: services/admin
      - name: Test with coverage thresholds
        run: npm run test:coverage
        working-directory: services/admin
      - name: Enforce changed-file coverage
        if: ${{ github.event_name == 'pull_request' }}
        env:
          COVERAGE_BASE: origin/${{ github.base_ref }}
        run: npm run test:coverage:changed
        working-directory: services/admin
      - run: npm run build
        working-directory: services/admin
      - name: Enforce Admin bundle size budget
        run: npm run check:bundle-size
        working-directory: services/admin
      - name: Upload full Admin coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: admin-coverage-full
          path: services/admin/coverage/full
          if-no-files-found: error
          retention-days: 14
      - name: Upload changed-file Admin coverage
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: admin-coverage-changed
          path: services/admin/coverage/changed
          if-no-files-found: error
          retention-days: 14

  admin-api:
    name: Admin API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: services/admin-api
      - run: .venv/bin/ruff check app/ scripts/ tests/
        working-directory: services/admin-api
      - run: .venv/bin/python -m pytest -q
        working-directory: services/admin-api

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: sdk/python
      - run: .venv/bin/ruff check apdl/ tests/
        working-directory: sdk/python
      - run: .venv/bin/python -m pytest -q --cov=apdl --cov-report=term-missing --cov-fail-under=88
        working-directory: sdk/python

  ingestion-service:
    name: Ingestion Service
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      APDL_TEST_REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: services/ingestion
      - run: .venv/bin/ruff check app/
        working-directory: services/ingestion
      - run: .venv/bin/python -m pytest -q
        working-directory: services/ingestion

  config-service:
    name: Config Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: services/config
      - run: .venv/bin/ruff check app/
        working-directory: services/config
      - run: .venv/bin/python -m pytest -q
        working-directory: services/config

  query-service:
    name: Query Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: services/query
      - run: .venv/bin/ruff check app/
        working-directory: services/query
      - run: .venv/bin/python -m pytest -q
        working-directory: services/query
      - run: make test-query-clickhouse

  agents-service:
    name: Agents Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: services/agents
      - run: .venv/bin/ruff check app/
        working-directory: services/agents
      - run: .venv/bin/python -m pytest -q
        working-directory: services/agents

  codegen-service:
    name: Codegen Service and Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - run: uv venv --python 3.12 .venv && uv pip install -e ".[dev]" --python .venv/bin/python
        working-directory: services/codegen
      - run: .venv/bin/ruff check app/ tests/
        working-directory: services/codegen
      - run: .venv/bin/python -m pytest -q
        working-directory: services/codegen

  clickhouse-writer:
    name: ClickHouse Writer
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
        env:
          POSTGRES_DB: apdl
          POSTGRES_USER: apdl
          POSTGRES_PASSWORD: apdl_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apdl -d apdl"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      APDL_WRITER_SINGLETON_TEST_POSTGRES_URL: postgresql://apdl:apdl_dev@localhost:5432/apdl
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - run: uv venv --python 3.12 .venv && uv pip install -r requirements-dev.txt --python .venv/bin/python
        working-directory: pipeline/redis
      - run: .venv/bin/ruff check clickhouse_writer.py tests/
        working-directory: pipeline/redis
      - run: .venv/bin/python -m pytest -q
        working-directory: pipeline/redis
      - run: make test-boundary-markers

  python-dependency-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Audit reproducible core runtime locks
        shell: bash
        run: |
          set -euo pipefail
          for lock in \
            services/ingestion/requirements.lock \
            services/config/requirements.lock \
            services/query/requirements.lock \
            services/agents/requirements.lock \
            services/admin-api/requirements.lock \
            services/codegen/requirements.lock \
            pipeline/redis/requirements.lock
          do
            uvx --python 3.12 pip-audit --strict --require-hashes -r "$lock"
          done
      - name: Audit published Codegen worker lock
        run: services/codegen/scripts/audit_worker_dependencies.sh
      - name: Audit resolved published and preview Python runtimes
        shell: bash
        run: |
          set -euo pipefail
          for project in sdk/python
          do
            slug="${project//\//-}"
            requirements="$RUNNER_TEMP/$slug-audit.txt"
            uv pip compile "$project/pyproject.toml" \
              --python-version 3.12 \
              --output-file "$requirements" \
              --quiet
            uvx --python 3.12 pip-audit --strict -r "$requirements"
          done

  package-contracts:
    name: Release Package Contracts
    runs-on: ubuntu-latest
    env:
      NODE: node
      NPM: npm
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/javascript/package-lock.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - run: npm ci
        working-directory: sdk/javascript
      - name: Install packed-contract validator
        run: >-
          uv venv --python 3.12 services/ingestion/.venv &&
          uv pip install -e services/ingestion
          --python services/ingestion/.venv/bin/python
      - run: make verify-release
      - run: make test-script-contracts
      - run: make test-packed-sdk-contract
      - run: make test-packed-python-sdk

  fresh-core-smoke:
    name: Fresh Install Core Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: make smoke-fresh

  fresh-experiment-smoke:
    name: Fresh Install Experiment Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: make smoke-experiment-fresh

  clickhouse-upgrade-smoke:
    name: ClickHouse Upgrade Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - run: make test-clickhouse-upgrade

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    name: Release Gates
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      pull-requests: read

  build-artifacts:
    name: Build Release Artifacts
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE: node
      NPM: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/javascript/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: npm ci
        working-directory: sdk/javascript
      - name: Install packed-contract validator
        run: >-
          uv venv --python 3.12 services/ingestion/.venv &&
          uv pip install -e services/ingestion
          --python services/ingestion/.venv/bin/python
      - name: Validate release tag and manifest
        run: >-
          python scripts/verify_release.py
          --tag "$GITHUB_REF_NAME"
          --check-registries
      - name: Build and verify release artifacts once
        shell: bash
        run: |
          set -euo pipefail
          root="$PWD"
          mkdir -p release-artifacts/npm release-artifacts/python
          ./scripts/test-packed-sdk-contract.sh "$root/release-artifacts/npm"
          ./scripts/test-packed-python-sdk.sh "$root/release-artifacts/python"
          python scripts/verify_python_artifacts.py release-artifacts/python

          npm_artifact="release-artifacts/npm/apdl-oss-sdk-0.3.0.tgz"
          python_wheel="release-artifacts/python/apdl_sdk-0.3.0-py3-none-any.whl"
          python_sdist="release-artifacts/python/apdl_sdk-0.3.0.tar.gz"
          test -f "$npm_artifact"
          test -f "$python_wheel"
          test -f "$python_sdist"

          {
            (cd release-artifacts/npm && sha256sum apdl-oss-sdk-0.3.0.tgz)
            (cd release-artifacts/python && sha256sum \
              apdl_sdk-0.3.0-py3-none-any.whl \
              apdl_sdk-0.3.0.tar.gz)
          } > release-artifacts/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          if-no-files-found: error
          retention-days: 7
          path: |
            release-artifacts/npm/apdl-oss-sdk-0.3.0.tgz
            release-artifacts/python/apdl_sdk-0.3.0-py3-none-any.whl
            release-artifacts/python/apdl_sdk-0.3.0.tar.gz
            release-artifacts/SHA256SUMS

  publish-npm:
    name: Publish npm Package
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts
      - name: Publish exact npm tarball
        run: >-
          npm publish
          "$GITHUB_WORKSPACE/release-artifacts/npm/apdl-oss-sdk-0.3.0.tgz"
          --provenance
          --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish Python Package
    needs: build-artifacts
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts
      - name: Publish exact wheel and source distribution
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-artifacts/python

  github-release:
    name: Create GitHub Release
    needs: [publish-npm, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/npm/apdl-oss-sdk-0.3.0.tgz
            release-artifacts/python/apdl_sdk-0.3.0-py3-none-any.whl
            release-artifacts/python/apdl_sdk-0.3.0.tar.gz
            release-artifacts/SHA256SUMS

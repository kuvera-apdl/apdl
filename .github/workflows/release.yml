name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  # Release tags share mutable convenience tags such as `latest`; serialize all
  # publications so concurrent tags cannot race that pointer.
  group: release-publication
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    name: Release Gates
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      pull-requests: read

  build-artifacts:
    name: Build Release Artifacts
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      docker_matrix: ${{ steps.release.outputs.docker_matrix }}
    permissions:
      contents: read
    env:
      NODE: node
      NPM: npm
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/javascript/package-lock.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - run: npm ci
        working-directory: sdk/javascript
      - name: Install packed-contract validator
        run: >-
          uv venv --python 3.12 services/ingestion/.venv &&
          uv pip install -e services/ingestion
          --python services/ingestion/.venv/bin/python
      - name: Validate release tag and manifest
        id: release
        shell: bash
        run: |
          set -euo pipefail
          python scripts/verify_release.py --tag "$GITHUB_REF_NAME"
          version=$(python -c 'import json; print(json.load(open("release-manifest.json"))["version"])')
          egress_policy_sha256=$(python scripts/codegen-egress-policy-digest.py)
          docker_matrix=$(python scripts/verify_release.py \
            --tag "$GITHUB_REF_NAME" \
            --docker-matrix \
            --revision "$GITHUB_SHA" \
            --egress-policy-sha256 "$egress_policy_sha256")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "docker_matrix=$docker_matrix" >> "$GITHUB_OUTPUT"
      - name: Build and verify release artifacts once
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          root="$PWD"
          mkdir -p release-artifacts/npm release-artifacts/python
          ./scripts/test-packed-sdk-contract.sh "$root/release-artifacts/npm"
          ./scripts/test-packed-python-sdk.sh "$root/release-artifacts/python"
          python scripts/verify_python_artifacts.py release-artifacts/python

          npm_artifact="release-artifacts/npm/apdl-oss-sdk-${VERSION}.tgz"
          python_wheel="release-artifacts/python/apdl_sdk-${VERSION}-py3-none-any.whl"
          python_sdist="release-artifacts/python/apdl_sdk-${VERSION}.tar.gz"
          test -f "$npm_artifact"
          test -f "$python_wheel"
          test -f "$python_sdist"
          cp release-manifest.json release-artifacts/release-manifest.json

          {
            (cd release-artifacts && sha256sum release-manifest.json)
            (cd release-artifacts/npm && sha256sum "apdl-oss-sdk-${VERSION}.tgz")
            (cd release-artifacts/python && sha256sum \
              "apdl_sdk-${VERSION}-py3-none-any.whl" \
              "apdl_sdk-${VERSION}.tar.gz")
          } > release-artifacts/SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          if-no-files-found: error
          retention-days: 7
          path: |
            release-artifacts/npm/apdl-oss-sdk-${{ steps.release.outputs.version }}.tgz
            release-artifacts/python/apdl_sdk-${{ steps.release.outputs.version }}-py3-none-any.whl
            release-artifacts/python/apdl_sdk-${{ steps.release.outputs.version }}.tar.gz
            release-artifacts/release-manifest.json
            release-artifacts/SHA256SUMS

  publish-npm:
    name: Publish npm Package
    needs: [build-artifacts, smoke-published-images]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts
          path: release-artifacts
      - name: Check immutable npm publication state
        id: registry
        shell: bash
        env:
          VERSION: ${{ needs.build-artifacts.outputs.version }}
        run: |
          set -euo pipefail
          state=$(python scripts/verify_published_artifacts.py npm \
            --version "$VERSION" \
            --artifact "release-artifacts/npm/apdl-oss-sdk-${VERSION}.tgz")
          echo "state=$state" >> "$GITHUB_OUTPUT"
      - name: Publish exact npm tarball
        if: steps.registry.outputs.state == 'absent'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.build-artifacts.outputs.version }}
        run: >-
          npm publish
          "$GITHUB_WORKSPACE/release-artifacts/npm/apdl-oss-sdk-${VERSION}.tgz"
          --provenance
          --access public
      - name: Verify exact npm artifact is published
        env:
          VERSION: ${{ needs.build-artifacts.outputs.version }}
        run: >-
          python scripts/verify_published_artifacts.py
          --wait-seconds 180 npm
          --version "$VERSION"
          --artifact "release-artifacts/npm/apdl-oss-sdk-${VERSION}.tgz"

  publish-pypi:
    name: Publish Python Package
    needs: [build-artifacts, smoke-published-images]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-artifacts
          path: release-artifacts
      - name: Check immutable PyPI publication state
        id: registry
        shell: bash
        env:
          VERSION: ${{ needs.build-artifacts.outputs.version }}
        run: |
          set -euo pipefail
          state=$(python scripts/verify_published_artifacts.py pypi \
            --version "$VERSION" \
            --artifacts-dir release-artifacts/python)
          echo "state=$state" >> "$GITHUB_OUTPUT"
      - name: Publish exact wheel and source distribution
        if: steps.registry.outputs.state == 'absent'
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: release-artifacts/python
      - name: Verify exact PyPI artifacts are published
        env:
          VERSION: ${{ needs.build-artifacts.outputs.version }}
        run: >-
          python scripts/verify_published_artifacts.py
          --wait-seconds 180 pypi
          --version "$VERSION"
          --artifacts-dir release-artifacts/python

  publish-docker-images:
    name: Publish ${{ matrix.name }} Image
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build-artifacts.outputs.docker_matrix) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Authenticate to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive canonical image tags and labels
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ matrix.repository }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=${{ needs.build-artifacts.outputs.version }}
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ !contains(needs.build-artifacts.outputs.version, '-') }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.build-artifacts.outputs.version }}
      - name: Check immutable GHCR publication state
        id: registry
        shell: bash
        env:
          IMAGE_REPOSITORY: ${{ matrix.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ needs.build-artifacts.outputs.version }}
        run: |
          set -euo pipefail
          inspection_dir=$(mktemp -d)

          inspect_digest() {
            local tag="$1"
            local output_name="$2"
            local reference="${IMAGE_REPOSITORY}:${tag}"
            if docker buildx imagetools inspect \
              "$reference" \
              >"${inspection_dir}/${output_name}.txt" \
              2>"${inspection_dir}/${output_name}.err"; then
              local value
              value=$(awk '$1 == "Digest:" { print $2; exit }' \
                "${inspection_dir}/${output_name}.txt")
              if [[ ! "$value" =~ ^sha256:[0-9a-f]{64}$ ]]; then
                echo "Registry returned no canonical digest for $reference" >&2
                cat "${inspection_dir}/${output_name}.txt" >&2
                return 1
              fi
              printf '%s\n' "$value"
              return 0
            fi
            if grep -Eiq 'manifest unknown|manifest.*not found' \
              "${inspection_dir}/${output_name}.err" \
              || { grep -Fq "$reference" "${inspection_dir}/${output_name}.err" \
                && grep -iq 'not found' "${inspection_dir}/${output_name}.err"; }; then
              printf 'absent\n'
              return 0
            fi
            cat "${inspection_dir}/${output_name}.err" >&2
            return 1
          }

          version_digest=$(inspect_digest "$RELEASE_VERSION" version)
          tag_digest=$(inspect_digest "$RELEASE_TAG" tag)
          revision_digest=$(inspect_digest "sha-${GITHUB_SHA}" revision)
          if test "$version_digest" = absent \
            && test "$tag_digest" = absent \
            && test "$revision_digest" = absent; then
            echo "state=absent" >> "$GITHUB_OUTPUT"
            echo "digest=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if test "$version_digest" = absent \
            || test "$tag_digest" = absent \
            || test "$revision_digest" = absent; then
            echo "Immutable release tags are only partially published" >&2
            exit 1
          fi
          if test "$version_digest" != "$tag_digest" \
            || test "$version_digest" != "$revision_digest"; then
            echo "Immutable release tags resolve to different image digests" >&2
            exit 1
          fi
          echo "state=present" >> "$GITHUB_OUTPUT"
          echo "digest=$version_digest" >> "$GITHUB_OUTPUT"
      - name: Build and publish multi-platform image
        if: steps.registry.outputs.state == 'absent'
        id: publish
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=release-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.name }}
          provenance: mode=max
          sbom: true
      - name: Attest the published image digest
        if: steps.registry.outputs.state == 'absent'
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-name: ${{ matrix.repository }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true
      - name: Resolve the immutable image digest
        id: image
        shell: bash
        env:
          EXISTING_DIGEST: ${{ steps.registry.outputs.digest }}
          PUBLISHED_DIGEST: ${{ steps.publish.outputs.digest }}
          REGISTRY_STATE: ${{ steps.registry.outputs.state }}
        run: |
          set -euo pipefail
          case "$REGISTRY_STATE" in
            absent) digest="$PUBLISHED_DIGEST" ;;
            present) digest="$EXISTING_DIGEST" ;;
            *) exit 1 ;;
          esac
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid published image digest" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Verify exact release provenance
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ matrix.repository }}@${{ steps.image.outputs.digest }}
        run: |
          set -euo pipefail
          gh attestation verify \
            "oci://$IMAGE" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
            --source-digest "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --deny-self-hosted-runners
      - name: Verify anonymous digest access
        shell: bash
        env:
          IMAGE: ${{ matrix.repository }}@${{ steps.image.outputs.digest }}
        run: |
          set -euo pipefail
          docker logout ghcr.io
          for attempt in {1..12}; do
            if docker buildx imagetools inspect "$IMAGE" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 5
          done
          echo "GHCR package must be Public before an OSS release can complete: $IMAGE" >&2
          exit 1
      - name: Record the immutable published reference
        shell: bash
        env:
          IMAGE_NAME: ${{ matrix.name }}
          IMAGE_REPOSITORY: ${{ matrix.repository }}
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ needs.build-artifacts.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p published-image
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "name": os.environ["IMAGE_NAME"],
              "repository": os.environ["IMAGE_REPOSITORY"],
              "digest": os.environ["IMAGE_DIGEST"],
              "tag": os.environ["RELEASE_TAG"],
              "version": os.environ["RELEASE_VERSION"],
          }
          target = Path("published-image") / f"{payload['name']}.json"
          target.write_text(json.dumps(payload, sort_keys=True) + "\n", encoding="utf-8")
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: published-image-${{ matrix.name }}
          if-no-files-found: error
          retention-days: 7
          path: published-image/${{ matrix.name }}.json

  smoke-published-images:
    name: Smoke Published Images (${{ matrix.platform }})
    needs: [build-artifacts, publish-docker-images]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: release-artifacts
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: published-image-*
          path: published-images
          merge-multiple: true
      - name: Bind Compose to the exact published image digests
        shell: bash
        run: >-
          python scripts/release_container_images.py prepare
          --manifest release-artifacts/release-manifest.json
          --records-dir published-images
          --index release-runtime/container-images.json
          --compose-override release-runtime/compose.release-images.yml
      - name: Prove every published image from an anonymous native pull
        shell: bash
        env:
          APDL_SMOKE_COMPOSE_OVERRIDE: ${{ github.workspace }}/release-runtime/compose.release-images.yml
          APDL_SMOKE_IMAGE_INDEX: ${{ github.workspace }}/release-runtime/container-images.json
          APDL_SMOKE_NO_BUILD: "true"
          APDL_SMOKE_PLATFORM: ${{ matrix.platform }}
          APDL_EXPECTED_SOURCE_REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker logout ghcr.io >/dev/null 2>&1 || true
          APDL_SMOKE_ALL_IMAGES=true make smoke-fresh
          make smoke-experiment-fresh
      - name: Record the passed native-platform image evidence
        shell: bash
        run: >-
          python scripts/release_container_images.py attest
          --index release-runtime/container-images.json
          --platform ${{ matrix.platform }}
          --evidence release-runtime/smoke-evidence-${{ matrix.arch }}.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: published-image-smoke-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 7
          path: release-runtime/smoke-evidence-${{ matrix.arch }}.json

  github-release:
    name: Create GitHub Release
    needs:
      - build-artifacts
      - publish-npm
      - publish-pypi
      - publish-docker-images
      - smoke-published-images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: release-artifacts
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: published-image-smoke-*
          path: published-image-smokes
          merge-multiple: true
      - name: Merge both native-platform proofs into the tested image index
        shell: bash
        run: >-
          python scripts/release_container_images.py merge
          --evidence-dir published-image-smokes
          --index release-artifacts/container-images.json
      - name: Add the all-image tested index checksum
        shell: bash
        run: |
          set -euo pipefail
          (cd release-artifacts && sha256sum container-images.json >> SHA256SUMS)
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/npm/apdl-oss-sdk-${{ needs.build-artifacts.outputs.version }}.tgz
            release-artifacts/python/apdl_sdk-${{ needs.build-artifacts.outputs.version }}-py3-none-any.whl
            release-artifacts/python/apdl_sdk-${{ needs.build-artifacts.outputs.version }}.tar.gz
            release-artifacts/release-manifest.json
            release-artifacts/container-images.json
            release-artifacts/SHA256SUMS

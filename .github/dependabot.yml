version: 2
updates:
  # Python SDK (apdl-sdk)
  - package-ecosystem: "pip"
    directory: "/sdk/python"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(sdk-python)"
    labels:
      - "dependencies"
      - "python"

  # JavaScript SDK (@apdl/sdk)
  - package-ecosystem: "npm"
    directory: "/sdk/javascript"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(sdk-js)"
    labels:
      - "dependencies"
      - "javascript"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(actions)"
    labels:
      - "dependencies"
      - "github-actions"

version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directories:
      - /sdk/javascript
      - /services/admin
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directories:
      - /sdk/python
      - /services/ingestion
      - /services/config
      - /services/query
      - /services/agents
      - /services/admin-api
      - /services/codegen
      - /pipeline/etl
      - /pipeline/redis
    schedule:
      interval: weekly
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directories:
      - /services/ingestion
      - /services/config
      - /services/query
      - /services/agents
      - /services/admin-api
      - /services/admin
      - /services/codegen
      - /pipeline/postgres
      - /pipeline/redis
    schedule:
      interval: weekly
    groups:
      docker-images:
        patterns: ["*"]

  - package-ecosystem: docker-compose
    directory: /infra/docker
    schedule:
      interval: weekly
    groups:
      compose-images:
        patterns: ["*"]

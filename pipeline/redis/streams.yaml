streams:
  events:raw:
    # Partitioned by project: events:raw:{project_id}
    # Producers never trim. Admission rejects atomically above this outstanding
    # depth, and the writer ACKs+deletes only ClickHouse/DLQ-durable entries.
    max_outstanding_entries: 1000000
    alert_outstanding_entries: 750000
    consumer_group: clickhouse-writer
    required_consumer_groups: 1
    # Completeness watermarks are process-local, so exactly one live writer may
    # advance this group. Startup enforces the topology with a PostgreSQL
    # singleton advisory lock; a second replica exits before reading Redis.
    consumers_per_group: 1
    upgrade_requires_legacy_producer_quiescence: true

  config:updates:
    maxlen: 10000

  agent:tasks:
    consumer_group: agent-workers
    consumers_per_group: 2
